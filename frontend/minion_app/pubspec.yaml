name: minion_app
description: "Minion - BankID Delegation App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # DI
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # URL launcher (BankID app launch)
  url_launcher: ^6.3.1

  # QR Code
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2

  # Intl
  intl: ^0.20.2

  # Firebase (FCM push notifications)
  # SETUP: run → flutterfire configure --project=YOUR_FIREBASE_PROJECT_ID
  # This generates lib/firebase_options.dart automatically.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  file_picker: ^10.3.10
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
