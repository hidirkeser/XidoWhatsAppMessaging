[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"

[environments.staging.deploy]
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
