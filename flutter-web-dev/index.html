<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Minion — Secure delegation management powered by Swedish BankID. Create, sign and verify legally-binding power of attorney documents in real time.">
  <meta name="theme-color" content="#312e81">

  <!-- Open Graph -->
  <meta property="og:title" content="Minion — BankID Delegation Management">
  <meta property="og:description" content="Secure delegation management powered by Swedish BankID. Create, sign and verify legally-binding power of attorney in real time.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://minion-website-production.up.railway.app/og-image.png">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Minion">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Minion</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #1e1b4b;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e1b4b;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 16px;
    }
    #loading-logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #e9d5ff;
    }
    #loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(155,111,212,0.3);
      border-top-color: #9b6fd4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-logo">🛡 Minion</div>
    <div id="loading-spinner"></div>
  </div>
  <script src="flutter_bootstrap.js?v=2" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>
</body>
</html>
