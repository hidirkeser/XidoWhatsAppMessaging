name: minion-prod

services:
  # ── ASP.NET API ──────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPO}/minion-api:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__DefaultConnection: >-
        Server=db,1433;Database=MinionDb;
        User Id=sa;Password=${SA_PASSWORD};
        TrustServerCertificate=true

      # JWT
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: Minion
      Jwt__Audience: Minion
      Jwt__AccessTokenExpiryMinutes: "15"

      # BankID  (test env by default — swap URL for production)
      BankId__BaseUrl: ${BANKID_BASE_URL:-https://appapi2.test.bankid.com/rp/v6.0/}
      BankId__CertificatePath: /certs/bankid.pfx
      BankId__CertificatePassword: ${BANKID_CERT_PASSWORD}

      # Firebase FCM
      Firebase__Enabled: ${FIREBASE_ENABLED:-false}
      Firebase__ServiceAccountJson: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}

      # WhatsApp / Twilio
      WhatsApp__Enabled: ${WHATSAPP_ENABLED:-false}
      WhatsApp__AccountSid: ${TWILIO_ACCOUNT_SID:-}
      WhatsApp__AuthToken: ${TWILIO_AUTH_TOKEN:-}
      WhatsApp__From: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}

      # Email (SMTP)
      Email__Enabled: ${EMAIL_ENABLED:-false}
      Email__SmtpHost: ${SMTP_HOST:-}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SmtpUser: ${SMTP_USER:-}
      Email__SmtpPass: ${SMTP_PASS:-}
      Email__FromAddress: ${EMAIL_FROM:-noreply@minion.app}
      Email__FromName: Minion

      # App URL (used in notification links)
      AppBaseUrl: https://${DOMAIN}

      # CORS — allow the Flutter web origin if hosted
      Cors__AllowedOrigins__0: https://${DOMAIN}

    volumes:
      - ./certs:/certs:ro          # BankID client certificate
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── SQL Server 2022 (Express — free, up to 10 GB) ────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Express
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      start_period: 45s
      retries: 5

  # ── Nginx reverse proxy + SSL ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - api

  # ── Certbot (Let's Encrypt — runs once then exits) ────────────────────────────
  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]           # only runs when explicitly invoked
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    command: >
      certonly --webroot -w /var/www/certbot
      -d ${DOMAIN}
      --email ${CERTBOT_EMAIL}
      --agree-tos --non-interactive --keep-until-expiring

volumes:
  sqldata:
  certbot-www:

networks:
  internal:
    driver: bridge
