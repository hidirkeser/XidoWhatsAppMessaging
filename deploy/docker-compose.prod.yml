name: minion-prod

# Railway'de kullanım:
#   - Bu dosya referans içindir.
#   - Railway, Dockerfile'ı otomatik algılar ve deploy eder.
#   - Environment variables Railway dashboard'dan girilir.
#   - PostgreSQL servisi Railway dashboard'dan 1 tıkla eklenir.

services:
  api:
    image: ghcr.io/${GITHUB_REPO}/minion-api:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:${PORT:-8080}

      # Railway PostgreSQL bağlantısı (Railway otomatik sağlar)
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}

      # JWT
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: Minion
      Jwt__Audience: Minion
      Jwt__AccessTokenExpiryMinutes: "15"

      # BankID
      BankId__BaseUrl: ${BANKID_BASE_URL:-https://appapi2.test.bankid.com/rp/v6.0/}
      BankId__CertificatePath: /certs/bankid.pfx
      BankId__CertificatePassword: ${BANKID_CERT_PASSWORD}

      # Firebase FCM
      Firebase__Enabled: ${FIREBASE_ENABLED:-false}
      Firebase__ServiceAccountJson: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}

      # WhatsApp / Twilio
      WhatsApp__Enabled: ${WHATSAPP_ENABLED:-false}
      WhatsApp__AccountSid: ${TWILIO_ACCOUNT_SID:-}
      WhatsApp__AuthToken: ${TWILIO_AUTH_TOKEN:-}
      WhatsApp__From: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}

      # Email
      Email__Enabled: ${EMAIL_ENABLED:-false}
      Email__SmtpHost: ${SMTP_HOST:-}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__SmtpUser: ${SMTP_USER:-}
      Email__SmtpPass: ${SMTP_PASS:-}
      Email__FromAddress: ${EMAIL_FROM:-noreply@minion.app}

      # App URL
      AppBaseUrl: ${APP_BASE_URL:-https://minion.up.railway.app}
      Cors__AllowedOrigins__0: ${APP_BASE_URL:-https://minion.up.railway.app}
