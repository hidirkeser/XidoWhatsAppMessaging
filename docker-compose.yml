name: minion-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: minion-postgres
    environment:
      POSTGRES_DB: MinionDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Minion@Dev2024!
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
