name: minion-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: minion-postgres
    environment:
      POSTGRES_DB: MinionDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Minion@Dev2024!
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: minion-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    logging:
      driver: none    # suppress verbose mailhog logs

volumes:
  postgres-data:
