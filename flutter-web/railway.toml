[build]
builder = "DOCKERFILE"
dockerfilePath = "flutter-web/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.staging]
[environments.staging.deploy]
restartPolicyType = "ON_FAILURE"

[environments.production]
[environments.production.deploy]
restartPolicyType = "ON_FAILURE"
