name: CI/CD

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/xido-whatsapp-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Xido.WhatsApp.sln

      - name: Build
        run: dotnet build Xido.WhatsApp.sln --no-restore --configuration Release

  # ── Docker Build & Push to GHCR ──────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/staging' ||
       github.ref == 'refs/heads/dev') &&
      github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Railway ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker
    if: |
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/staging' ||
       github.ref == 'refs/heads/dev') &&
      github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy — Production
        if: github.ref == 'refs/heads/main'
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_PROD }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy — Staging
        if: github.ref == 'refs/heads/staging'
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy — Dev
        if: github.ref == 'refs/heads/dev'
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_DEV }} --environment dev --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health Check
        run: |
          sleep 30
          if   [ "${{ github.ref }}" = "refs/heads/main" ];    then URL="${{ secrets.RAILWAY_PROD_URL }}/health"
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then URL="${{ secrets.RAILWAY_STAGING_URL }}/health"
          else URL="${{ secrets.RAILWAY_DEV_URL }}/health"; fi
          echo "Checking $URL"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then echo "✓ Healthy (attempt $i)"; exit 0; fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."; sleep 15
          done
          echo "✗ Health check failed"; exit 1
