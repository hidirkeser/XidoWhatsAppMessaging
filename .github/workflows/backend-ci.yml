name: Backend CI/CD

on:
  push:
    branches: [main, dev, staging]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    branches: [main, dev, staging]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/minion-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Minion.sln

      - name: Build
        run: dotnet build Minion.sln --no-restore --configuration Release

      - name: Test (Domain)
        run: |
          dotnet test tests/Minion.Domain.Tests/Minion.Domain.Tests.csproj \
            --no-build --configuration Release \
            --logger "trx;LogFileName=domain-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Test (Application)
        run: |
          dotnet test tests/Minion.Application.Tests/Minion.Application.Tests.csproj \
            --no-build --configuration Release \
            --logger "trx;LogFileName=application-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: 'backend/tests/**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true

  # ── Docker Build & Push to GHCR ──────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/dev'  ||
       github.ref == 'refs/heads/staging') &&
      github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Railway ─────────────────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker
    if: |
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/dev'  ||
       github.ref == 'refs/heads/staging') &&
      github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Production deploy (main branch)
      - name: Deploy to Railway — Production
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_PROD }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Staging deploy (staging branch)
      - name: Deploy to Railway — Staging
        if: github.ref == 'refs/heads/staging'
        working-directory: backend
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Dev deploy (dev branch)
      - name: Deploy to Railway — Dev
        if: github.ref == 'refs/heads/dev'
        working-directory: backend
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_DEV }} --environment dev --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Health check after deploy
      - name: Health Check
        run: |
          sleep 30
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL="${{ secrets.RAILWAY_PROD_URL }}/health"
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            URL="${{ secrets.RAILWAY_STAGING_URL }}/health"
          else
            URL="${{ secrets.RAILWAY_DEV_URL }}/health"
          fi
          echo "Checking health at $URL"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "✗ Health check failed after 10 attempts"
          exit 1
